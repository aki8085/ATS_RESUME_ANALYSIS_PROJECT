<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Analyzer | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg-dark:#0f172a;
    --primary:#2563eb;
    --secondary:#38bdf8;
    --card:#ffffff;
    --border:#e5e7eb;
}

*{
    box-sizing:border-box;
    font-family:'Segoe UI',system-ui,sans-serif;
}

body{
    margin:0;
    height:100vh;
    background:linear-gradient(120deg,var(--bg-dark),#020617);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== MAIN CONTAINER ===== */
.container{
    width:1000px;
    height:600px;
    background:var(--card);
    border-radius:18px;
    display:flex;
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,.35);
}

/* ===== LEFT SIDE ===== */
.left{
    flex:1;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:40px;
    margin-bottom:15px;
}

.left p{
    font-size:16px;
    line-height:1.6;
    opacity:.9;
}

/* ===== RIGHT SIDE ===== */
.right{
    flex:1;
    padding:50px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.form-box{
    width:100%;
    max-width:360px;
}

.form-box h2{
    margin-bottom:6px;
    color:#0f172a;
}

.form-box p{
    margin-bottom:25px;
    color:#64748b;
    font-size:14px;
}

/* ===== INPUTS ===== */
.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    font-size:13px;
    margin-bottom:6px;
    color:#334155;
}

.input-group input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    outline:none;
    font-size:14px;
}

.input-group input:focus{
    border-color:var(--primary);
}

/* ===== BUTTONS ===== */
.btn{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-google{
    margin-top:14px;
    background:white;
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.btn-google img{
    width:18px;
}

/* ===== TOGGLE ===== */
.toggle{
    margin-top:18px;
    text-align:center;
    font-size:14px;
}

.toggle span{
    color:var(--primary);
    cursor:pointer;
    font-weight:600;
}

/* ===== ERROR ===== */
.error{
    color:#dc2626;
    font-size:13px;
    margin-bottom:10px;
    display:none;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
    .container{
        flex-direction:column;
        height:auto;
        width:90%;
    }
    .left{
        padding:40px;
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>Resume Analyzer</h1>
        <p>
            Optimize your resume with ATS-friendly analysis,  
            skill matching, and professional insights.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="form-box">

            <h2 id="formTitle">Login</h2>
            <p id="formDesc">Access your resume dashboard</p>

            <div class="error" id="errorMsg"></div>

            <!-- EMAIL -->
            <div class="input-group">
                <label>Email or User ID</label>
                <input type="text" id="email">
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password">
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="input-group" id="confirmGroup" style="display:none;">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword">
            </div>

          <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
    LOGIN
</button>

            <button class="btn btn-google">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg">
                Continue with Google
            </button>

            <div class="toggle">
                <span id="toggleText">Don’t have an account?</span>
                <span onclick="toggleForm()"> Sign up</span>
            </div>

        </div>
    </div>

</div>

<script>
let isLogin = true;

function toggleForm(){
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText =
        isLogin ? "Login" : "Create Account";

    document.getElementById("formDesc").innerText =
        isLogin ? "Access your resume dashboard" : "Create your ATS account";

    document.getElementById("confirmGroup").style.display =
        isLogin ? "none" : "block";

    document.getElementById("toggleText").innerText =
        isLogin ? "Don’t have an account?" : "Already have an account?";

    document.querySelector(".toggle span:last-child").innerText =
        isLogin ? " Sign up" : " Login";

    hideError();
}

function submitForm(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    // 🔴 EMAIL VALIDATION
    if(email.length < 5){
        return showError("Email/User ID must be at least 5 characters");
    }

    if(/\s/.test(email)){
        return showError("Email/User ID cannot contain spaces");
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(email)){
        return showError("Enter a valid email address");
    }

    // 🔴 PASSWORD VALIDATION
    if(password.length < 8){
        return showError("Password must be at least 8 characters");
    }

    if(!/[A-Z]/.test(password)){
        return showError("Password must contain at least one uppercase letter");
    }

    if(!/[a-z]/.test(password)){
        return showError("Password must contain at least one lowercase letter");
    }

    if(!/[0-9]/.test(password)){
        return showError("Password must contain at least one number");
    }

    if(!/[!@#$%^&*(),.?\":{}|<>]/.test(password)){
        return showError("Password must contain at least one special character");
    }

    // 🔴 SIGNUP CONFIRM PASSWORD
    if(!isLogin){
        if(confirm === ""){
            return showError("Please confirm your password");
        }

        if(password !== confirm){
            return showError("Passwords do not match");
        }

        alert("Account created successfully. Please login.");
        toggleForm();
        return;
    }

    // ✅ LOGIN SUCCESS
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("currentUser", email);

    window.location.href = "dashboard.html";
}

function showError(message){
    const error = document.getElementById("errorMsg");
    error.innerText = message;
    error.style.display = "block";
}

function hideError(){
    document.getElementById("errorMsg").style.display = "none";
}
</script>

</body>
</html>
