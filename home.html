<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATS Resume Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg1:#020617;
  --bg2:#0f172a;
  --card:rgba(255,255,255,.12);
  --text:#f1f5f9;
  --sub:#94a3b8;
  --primary:#7c3aed;
  --button:linear-gradient(135deg,#7c3aed,#4f46e5);
  --error:#ef4444;
  --success:#22c55e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(120deg,var(--bg1),var(--bg2));
  animation:spaceMove 12s ease infinite;
  color:var(--text);
}

@keyframes spaceMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* HEADER */
header{
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
}

header h1{color:var(--primary)}

.hamburger{
  font-size:28px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  right:-280px;
  width:280px;
  height:100%;
  background:rgba(15,23,42,.95);
  padding:25px;
  transition:.4s;
  z-index:1000;
}

.menu.active{right:0}

.menu button{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  background:var(--button);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.menu .back-btn{
  background:none;
  color:var(--primary);
  font-size:22px;
}

/* CONTENT */
.container{
  max-width:1100px;
  margin:70px auto;
  padding:20px;
}

.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
}

.hero h2{font-size:42px}
.hero p{color:var(--sub);margin-top:15px;line-height:1.6}

.upload-card{
  background:var(--card);
  backdrop-filter:blur(14px);
  padding:40px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.upload-card input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.15);
  color:white;
}

.upload-card button{
  margin-top:15px;
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--button);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.upload-card button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.msg{margin-top:10px;font-size:14px}
.error{color:var(--error)}
.success{color:var(--success)}

#result{display:none;margin-top:60px}

.progress{
  background:rgba(255,255,255,.2);
  border-radius:20px;
  height:25px;
  margin:20px 0;
}

.progress-bar{
  height:100%;
  width:0;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border-radius:20px;
  transition:2s;
}

footer{
  margin-top:100px;
  padding:30px;
  text-align:center;
  color:var(--sub);
}

@media(max-width:768px){
  .hero{grid-template-columns:1fr;text-align:center}
}
</style>
</head>

<body>

<header>
  <h1>ATS Resume Analyzer</h1>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <button class="back-btn" onclick="toggleMenu()">← Back</button>
  <button onclick="goLogin()">Login</button>
  <button onclick="logout()">Logout</button>
  <button onclick="viewHistory()">History</button>
</div>

<div class="container">

<div class="hero">
  <div>
    <h2>Optimize Your Resume for ATS</h2>
    <p>Upload your resume to receive ATS score, keyword matching and improvement tips.</p>
  </div>

  <div class="upload-card">
    <h3>Upload Resume</h3>
    <p class="sub">PDF / DOC / DOCX • Max 2MB</p><br>
    <input type="file" id="resumeFile">
    <div id="fileMsg" class="msg"></div>
    <button id="analyzeBtn" onclick="analyze()">Analyze Resume</button>
  </div>
</div>

<div id="result">
  <h2>Your ATS Score</h2>
  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>
  <h3 id="scoreText"></h3>
</div>

</div>

<footer>© 2026 ATS Resume Analyzer | MCA Final Year Project</footer>

<script>
/* ELEMENTS */
const menu=document.getElementById("menu");
const historyLimit=10;

/* AUTH CHECK (Frontend demo only) */
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

/* LOAD HISTORY */
let history=JSON.parse(localStorage.getItem("history"))||[];

/* MENU */
function toggleMenu(){
  menu.classList.toggle("active");
}

/* LOGIN */
function goLogin(){
  window.location.href="login.html";
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

/* ANALYZE */
function analyze(){
  const input=document.getElementById("resumeFile");
  const msg=document.getElementById("fileMsg");
  const btn=document.getElementById("analyzeBtn");

  msg.textContent="";
  msg.className="msg";

  if(!input.files.length){
    msg.textContent="Please upload a resume file";
    msg.classList.add("error");
    return;
  }

  const file=input.files[0];
  const validTypes=[
    "application/pdf",
    "application/msword",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  ];

  if(!validTypes.includes(file.type)){
    msg.textContent="Invalid file type (PDF/DOC/DOCX only)";
    msg.classList.add("error");
    return;
  }

  if(file.size>2*1024*1024){
    msg.textContent="File size must be under 2MB";
    msg.classList.add("error");
    return;
  }

  btn.disabled=true;
  msg.textContent="Analyzing resume...";
  msg.classList.add("success");

  setTimeout(()=>{
    const score=Math.floor(Math.random()*21)+70;
    document.getElementById("result").style.display="block";
    document.getElementById("bar").style.width=score+"%";
    document.getElementById("scoreText").textContent=score+"%";

    history.unshift(`${file.name} → ATS Score ${score}%`);
    history=history.slice(0,historyLimit);
    localStorage.setItem("history",JSON.stringify(history));

    btn.disabled=false;
    msg.textContent="Analysis completed successfully";
  },1500);
}

/* HISTORY */
function viewHistory(){
  alert(history.length?history.join("\n"):"No analysis history found");
  toggleMenu();
}
</script>

</body>
</html>
